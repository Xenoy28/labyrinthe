<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Labyrinthe à Bille</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#fff;overflow:hidden;font-family:monospace;}
#gc{width:100%;position:relative;touch-action:none;background:#ffffff;}
#gc canvas{display:block;width:100%;}
.panel{position:absolute;top:0;left:0;width:100%;height:100%;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:14px;background:rgba(255,255,255,0.92);}
.panel h2{color:#2c3dd6;font-size:22px;font-weight:700;margin:0;letter-spacing:.04em;}
.panel p{color:#555;font-size:12px;margin:0;text-align:center;padding:0 1.5rem;}
.btn{padding:10px 32px;border:2px solid #3dd6c8;background:transparent;color:#2c3dd6;font-size:13px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;transition:background .2s,color .2s;}
.btn:hover,.btn:active{background:#3dd6c8;color:#fff;}
#hud{position:absolute;top:12px;left:14px;display:none;color:#2c3dd6;font-size:11px;letter-spacing:.08em;font-family:monospace;}
#tilt-indicator{position:absolute;bottom:14px;right:14px;width:48px;height:48px;display:none;}
#wo{display:none;flex-direction:column;}
#gyro-status{font-size:10px;padding:4px 10px;border-radius:4px;margin-top:4px;display:none;}
#gyro-btn{padding:8px 20px;border:1.5px solid #e63946;background:transparent;color:#e63946;font-size:12px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;display:none;}
</style>
</head>
<body>
<div id="gc">
  <canvas id="c"></canvas>
  <div class="panel" id="overlay">
    <h2>Labyrinthe à Bille</h2>
    <p>PC — glisser la souris · Mobile — incliner le téléphone ou glisser le doigt</p>
    <button class="btn" id="start-btn">Commencer</button>
    <button id="gyro-btn">Activer le gyroscope</button>
    <div id="gyro-status"></div>
  </div>
  <div class="panel" id="wo" style="display:none;">
    <h2>Arrivée !</h2>
    <p id="win-time">Temps : 00:00</p>
    <button class="btn" id="restart-btn">Rejouer</button>
  </div>
  <div id="hud">
    <div>TEMPS — <span id="timer">00:00</span></div>
    <div>TILT X <span id="hud-tx">0.00</span> Z <span id="hud-tz">0.00</span></div>
    <div>GYRO <span id="hud-gyro">—</span></div>
  </div>
  <svg id="tilt-indicator" viewBox="0 0 48 48" style="display:none;">
    <circle cx="24" cy="24" r="22" fill="none" stroke="#3dd6c8" stroke-width="1" opacity="0.5"/>
    <circle id="tilt-dot" cx="24" cy="24" r="3" fill="#3dd6c8"/>
  </svg>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ─── GYROSCOPE ROBUSTE ANDROID ────────────────────────────────────────────────
// Stratégie multi-couches :
// 1. DeviceOrientationEvent.requestPermission (iOS 13+)
// 2. Ecoute directe (Android Chrome, Firefox)
// 3. Fallback tactile si rien ne marche

let gyroEnabled  = false; // gyro reçu et actif
let gyroGranted  = false; // permission accordée ou non requise
let gyroActive   = false; // premier event reçu => calibration faite
let betaOffset   = 0, gammaOffset = 0;
let tTiltX = 0, tTiltZ = 0;
let gyroListenerAttached = false;
let gyroFallbackWarned   = false;

const gyroStatus = document.getElementById('gyro-status');
const gyroBtn    = document.getElementById('gyro-btn');

function showGyroStatus(msg, color){
  gyroStatus.textContent = msg;
  gyroStatus.style.background = color || '#eef';
  gyroStatus.style.color = '#2c3dd6';
  gyroStatus.style.display = 'block';
}

// Handler gyro — partagé pour pouvoir le retirer si besoin
function onDeviceOrientation(e){
  if(!running) return;

  // Certains navigateurs Android envoient des events à null au démarrage
  if(e.beta === null && e.gamma === null) return;

  const beta  = e.beta  || 0;
  const gamma = e.gamma || 0;

  if(!gyroActive){
    betaOffset  = beta;
    gammaOffset = gamma;
    gyroActive  = true;
    showGyroStatus('Gyroscope actif ✓', '#d0faf7');
    gyroStatus.style.color = '#0a7a6e';
  }

  const relBeta  = beta  - betaOffset;
  const relGamma = gamma - gammaOffset;

  // Sensibilité calibrée pour Android (0.016 pour Chrome, légèrement plus fort)
  tTiltX = Math.max(-0.32, Math.min(0.32, -relBeta  * 0.016));
  tTiltZ = Math.max(-0.32, Math.min(0.32, -relGamma * 0.016));

  gyroEnabled = true;
}

function attachGyroListener(){
  if(gyroListenerAttached) return;
  window.addEventListener('deviceorientation', onDeviceOrientation, true);
  gyroListenerAttached = true;

  // Timeout : si aucun event en 2s sur Android, probablement bloqué
  setTimeout(()=>{
    if(!gyroActive && running){
      showGyroStatus('Gyroscope non détecté — glisser pour jouer', '#fff0cc');
      gyroStatus.style.color = '#a06000';
    }
  }, 2000);
}

// Android : tester si le moteur accepte les events sans permission
function tryAndroidDirect(){
  // Test silencieux : écouter 1 event, si on en reçoit un c'est bon
  let testReceived = false;
  function testHandler(e){
    if(e.beta !== null || e.gamma !== null){
      testReceived = true;
    }
    window.removeEventListener('deviceorientation', testHandler, true);
  }
  window.addEventListener('deviceorientation', testHandler, true);

  setTimeout(()=>{
    if(!testReceived){
      // Aucun event reçu -> montrer le bouton d'activation
      gyroBtn.style.display = 'block';
      showGyroStatus('Appuyez sur "Activer le gyroscope" avant de commencer', '#fff0cc');
      gyroStatus.style.color = '#a06000';
    }
  }, 800);
}

// Détection de la plateforme et stratégie appropriée
function initGyro(){
  const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) ||
                (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);

  if(typeof DeviceOrientationEvent !== 'undefined'){
    if(typeof DeviceOrientationEvent.requestPermission === 'function'){
      // iOS 13+ — nécessite un geste utilisateur (géré par start-btn / gyro-btn)
      gyroBtn.style.display = 'block';
      showGyroStatus('iOS : appuyez sur "Activer le gyroscope"', '#eef0ff');
    } else {
      // Android / autre — essayer directement
      gyroGranted = true;
      attachGyroListener();
      if(!isIOS) tryAndroidDirect();
    }
  } else {
    showGyroStatus('Gyroscope non supporté — glisser pour jouer', '#ffeaea');
    gyroStatus.style.color = '#c00';
  }
}

// Bouton séparé pour iOS / Android récalcitrant (nécessite geste utilisateur)
gyroBtn.addEventListener('click', ()=>{
  if(typeof DeviceOrientationEvent.requestPermission === 'function'){
    // iOS
    DeviceOrientationEvent.requestPermission().then(state => {
      if(state === 'granted'){
        gyroGranted = true;
        attachGyroListener();
        showGyroStatus('Gyroscope iOS autorisé ✓', '#d0faf7');
        gyroStatus.style.color = '#0a7a6e';
        gyroBtn.style.display = 'none';
      } else {
        showGyroStatus('Permission refusée — glisser pour jouer', '#ffeaea');
        gyroStatus.style.color = '#c00';
      }
    }).catch(()=>{
      showGyroStatus('Erreur permission — glisser pour jouer', '#ffeaea');
    });
  } else {
    // Android : forcer l'écoute (certains Android bloquent sans geste)
    gyroGranted = true;
    attachGyroListener();
    gyroBtn.style.display = 'none';
    showGyroStatus('Gyroscope activé ✓', '#d0faf7');
    gyroStatus.style.color = '#0a7a6e';
  }
});

// Lancer la détection au chargement
initGyro();

// ─── THREE.JS ────────────────────────────────────────────────────────────────
const cont = document.getElementById('gc');
const cvs  = document.getElementById('c');
const W = () => cont.clientWidth;
const H = () => Math.min(W(), 580);

const renderer = new THREE.WebGLRenderer({canvas: cvs, antialias: true});
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.setClearColor(0xffffff, 1);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0xffffff);
scene.fog = new THREE.FogExp2(0xffffff, 0.028);

const camera = new THREE.PerspectiveCamera(42, 1, 0.1, 100);
camera.position.set(0, 15, 11);
camera.lookAt(0, 0, 0);

function resize(){
  const w = W(), h = H();
  renderer.setSize(w, h, false);
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
}
resize();
window.addEventListener('resize', resize);

scene.add(new THREE.AmbientLight(0xffffff, 1.1));
const dir = new THREE.DirectionalLight(0xffffff, 0.7);
dir.position.set(4, 14, 6);
dir.castShadow = true;
dir.shadow.mapSize.set(1024,1024);
dir.shadow.camera.left=-12;dir.shadow.camera.right=12;
dir.shadow.camera.top=12;dir.shadow.camera.bottom=-12;
scene.add(dir);
const pt1 = new THREE.PointLight(0x3dd6c8, 0.4, 20);
pt1.position.set(0, 6, 0);
scene.add(pt1);

const TEAL=0x3dd6c8,BLUE=0x2c3dd6,BGLIGHT=0xeef0f5,BGFLOOR=0xf5f7fa,WALL=0x3dd6c8,HOLE=0x1a1a2e;
const MAT_BOARD   =new THREE.MeshLambertMaterial({color:BGLIGHT});
const MAT_FLOOR   =new THREE.MeshLambertMaterial({color:BGFLOOR});
const MAT_WALL    =new THREE.MeshLambertMaterial({color:WALL,emissive:TEAL,emissiveIntensity:0.08});
const MAT_WALL_OUT=new THREE.MeshLambertMaterial({color:BLUE,emissive:BLUE,emissiveIntensity:0.12});
const MAT_BALL    =new THREE.MeshStandardMaterial({color:BLUE,metalness:0.6,roughness:0.2,emissive:0x1a2580,emissiveIntensity:0.15});
const MAT_EDGE    =new THREE.MeshLambertMaterial({color:TEAL,emissive:TEAL,emissiveIntensity:0.25});
const MAT_START   =new THREE.MeshLambertMaterial({color:0xd0faf7,emissive:TEAL,emissiveIntensity:0.3,transparent:true,opacity:0.9});
const MAT_FINISH  =new THREE.MeshLambertMaterial({color:0xffd6d6,emissive:0xe63946,emissiveIntensity:0.35,transparent:true,opacity:0.9});

const BS=10,BT=0.3,WH=0.4,WT=0.13;
const boardGroup=new THREE.Group();
scene.add(boardGroup);

const base=new THREE.Mesh(new THREE.BoxGeometry(BS+1.4,BT,BS+1.4),MAT_BOARD);
base.receiveShadow=true;
boardGroup.add(base);

const floor=new THREE.Mesh(new THREE.BoxGeometry(BS,0.04,BS),MAT_FLOOR);
floor.position.y=BT/2+0.02;
floor.receiveShadow=true;
boardGroup.add(floor);

[[BS/2+0.7,0,0],[-(BS/2+0.7),0,0],[0,0,BS/2+0.7],[0,0,-(BS/2+0.7)]].forEach(([x,y,z],i)=>{
  const isZ=i>=2;
  const g=new THREE.BoxGeometry(isZ?BS+1.4:0.06,BT+0.1,isZ?0.06:BS+1.4);
  const m=new THREE.Mesh(g,MAT_EDGE);
  m.position.set(x,y,z);
  boardGroup.add(m);
});

for(let xi=-4;xi<=4;xi++){
  for(let zi=-4;zi<=4;zi++){
    if((xi+zi)%2===0)continue;
    const d=new THREE.Mesh(new THREE.CylinderGeometry(0.03,0.03,0.05,6),
      new THREE.MeshLambertMaterial({color:0xc8eceb}));
    d.position.set(xi,BT/2+0.04,zi);
    boardGroup.add(d);
  }
}

const floorY=BT/2+0.02;
const wallY=floorY+WH/2;
const WALLS=[
  {x:0,z:-5,w:10,d:WT},{x:0,z:5,w:10,d:WT},{x:-5,z:0,w:WT,d:10},{x:5,z:0,w:WT,d:10},
  {x:-2.5,z:-4,w:3,d:WT},{x:1.5,z:-4,w:2,d:WT},{x:-4,z:-3,w:WT,d:2},{x:-2,z:-2.5,w:WT,d:1.5},
  {x:0.5,z:-3,w:2.5,d:WT},{x:3,z:-3.5,w:WT,d:2},{x:2,z:-2,w:2,d:WT},{x:-3,z:-1,w:3,d:WT},
  {x:0,z:-1.5,w:WT,d:2},{x:2,z:-1,w:WT,d:2},{x:-4,z:0,w:2,d:WT},{x:1.5,z:0,w:2.5,d:WT},
  {x:4,z:0.5,w:WT,d:2},{x:-2,z:1,w:WT,d:2},{x:0.5,z:1,w:2,d:WT},{x:-3.5,z:2,w:1.5,d:WT},
  {x:1,z:2,w:3,d:WT},{x:-3,z:3,w:WT,d:2},{x:-1,z:3,w:2,d:WT},{x:2,z:3,w:WT,d:2},
  {x:-4,z:4,w:2,d:WT},{x:1.5,z:4,w:2.5,d:WT},
];

WALLS.forEach(({x,z,w,d},i)=>{
  const mat=i<4?MAT_WALL_OUT:MAT_WALL;
  const mesh=new THREE.Mesh(new THREE.BoxGeometry(w,WH,d),mat);
  mesh.position.set(x,wallY,z);
  mesh.castShadow=true;mesh.receiveShadow=true;
  boardGroup.add(mesh);
  if(i<4){
    const top=new THREE.Mesh(new THREE.BoxGeometry(w+0.02,0.04,d+0.02),MAT_EDGE);
    top.position.set(x,wallY+WH/2+0.02,z);
    boardGroup.add(top);
  }
});

const startM=new THREE.Mesh(new THREE.BoxGeometry(0.9,0.05,0.9),MAT_START);
startM.position.set(-4,floorY+0.04,-4);
boardGroup.add(startM);
const finishM=new THREE.Mesh(new THREE.BoxGeometry(0.9,0.05,0.9),MAT_FINISH);
finishM.position.set(4,floorY+0.04,4);
boardGroup.add(finishM);

[[-4,-4,TEAL],[4,4,0xe63946]].forEach(([cx,cz,col])=>{
  for(let k=0;k<3;k++){
    const seg=new THREE.Mesh(new THREE.BoxGeometry(0.06,0.08,0.5),
      new THREE.MeshLambertMaterial({color:col,emissive:col,emissiveIntensity:0.4}));
    seg.position.set(cx+(k-1)*0.18,floorY+0.08,cz);
    boardGroup.add(seg);
  }
});

const BALL_Y=BT/2+0.02+0.2;
const ball=new THREE.Mesh(new THREE.SphereGeometry(0.2,24,24),MAT_BALL);
ball.castShadow=true;
boardGroup.add(ball);
const ballLight=new THREE.PointLight(BLUE,0.5,2.5);
boardGroup.add(ballLight);

let bx=-4,bz=-4,vx=0,vz=0;
let tiltX=0,tiltZ=0;
let running=false,won=false,startTime=0;
ball.position.set(bx,BALL_Y,bz);

// ─── SOURIS ──────────────────────────────────────────────────────────────────
let md=false,lmx=0,lmy=0;
cvs.addEventListener('mousedown',e=>{if(running){md=true;lmx=e.clientX;lmy=e.clientY;cvs.style.cursor='crosshair';}});
window.addEventListener('mouseup',()=>{md=false;cvs.style.cursor='default';});
window.addEventListener('mousemove',e=>{
  if(!md||!running)return;
  const dx=e.clientX-lmx,dy=e.clientY-lmy;
  lmx=e.clientX;lmy=e.clientY;
  tTiltZ=Math.max(-0.32,Math.min(0.32,tTiltZ-dx*0.011));
  tTiltX=Math.max(-0.32,Math.min(0.32,tTiltX-dy*0.011));
});

// ─── TACTILE (fallback si pas de gyro) ───────────────────────────────────────
let ts=null;
cvs.addEventListener('touchstart',e=>{
  if(running) ts={x:e.touches[0].clientX,y:e.touches[0].clientY};
},{passive:true});
cvs.addEventListener('touchmove',e=>{
  if(!ts||!running)return;
  e.preventDefault();
  if(gyroEnabled) return; // gyro prioritaire
  const dx=e.touches[0].clientX-ts.x,dy=e.touches[0].clientY-ts.y;
  ts={x:e.touches[0].clientX,y:e.touches[0].clientY};
  tTiltZ=Math.max(-0.32,Math.min(0.32,tTiltZ+dx*0.011));
  tTiltX=Math.max(-0.32,Math.min(0.32,tTiltX+dy*0.011));
},{passive:false});

// ─── PHYSIQUE ─────────────────────────────────────────────────────────────────
function collide(nx,nz){
  const HALF=BS/2-0.22;
  if(nx<-HALF){nx=-HALF;vx=-vx*0.25;}
  if(nx>HALF){nx=HALF;vx=-vx*0.25;}
  if(nz<-HALF){nz=-HALF;vz=-vz*0.25;}
  if(nz>HALF){nz=HALF;vz=-vz*0.25;}
  for(const{x,z,w,d}of WALLS){
    const pw=w/2+0.2,pd=d/2+0.2;
    if(nx>x-pw&&nx<x+pw&&nz>z-pd&&nz<z+pd){
      const ox=pw-Math.abs(nx-x),oz=pd-Math.abs(nz-z);
      if(ox<oz){nx=nx<x?x-pw:x+pw;vx=-vx*0.25;}
      else{nz=nz<z?z-pd:z+pd;vz=-vz*0.25;}
    }
  }
  return[nx,nz];
}

function fmt(ms){const s=Math.floor(ms/1000),m=Math.floor(s/60);return String(m).padStart(2,'0')+':'+String(s%60).padStart(2,'0');}

// ─── DÉMARRAGE ───────────────────────────────────────────────────────────────
function startGame(){
  document.getElementById('overlay').style.display='none';
  document.getElementById('wo').style.display='none';
  document.getElementById('hud').style.display='block';
  document.getElementById('tilt-indicator').style.display='block';
  running=true;won=false;startTime=Date.now();
  bx=-4;bz=-4;vx=0;vz=0;tTiltX=0;tTiltZ=0;tiltX=0;tiltZ=0;
  gyroActive=false; // recalibration à chaque partie
  ball.position.set(bx,BALL_Y,bz);

  // Sur Android, s'assurer que le listener est bien attaché au moment du geste
  if(gyroGranted && !gyroListenerAttached){
    attachGyroListener();
  }
}

document.getElementById('start-btn').addEventListener('click', startGame);
document.getElementById('restart-btn').addEventListener('click', startGame);

// ─── BOUCLE ───────────────────────────────────────────────────────────────────
let frame=0;
function animate(){
  requestAnimationFrame(animate);
  frame++;
  if(running&&!won){
    tiltX+=(tTiltX-tiltX)*0.1;
    tiltZ+=(tTiltZ-tiltZ)*0.1;
    boardGroup.rotation.x=tiltX;
    boardGroup.rotation.z=tiltZ;
    vx-=Math.sin(tiltZ)*0.013;
    vz+=Math.sin(tiltX)*0.013;
    vx*=0.986;vz*=0.986;
    let nx=bx+vx,nz=bz+vz;
    [nx,nz]=collide(nx,nz);
    bx=nx;bz=nz;
    ball.position.set(bx,BALL_Y,bz);
    ballLight.position.set(bx,BALL_Y+0.3,bz);

    if((bx-4)**2+(bz-4)**2<0.3){
      won=true;running=false;
      document.getElementById('wo').style.display='flex';
      document.getElementById('win-time').textContent='Temps : '+fmt(Date.now()-startTime);
      document.getElementById('hud').style.display='none';
      document.getElementById('tilt-indicator').style.display='none';
    }
    document.getElementById('timer').textContent=fmt(Date.now()-startTime);
    document.getElementById('hud-tx').textContent=tiltX.toFixed(2);
    document.getElementById('hud-tz').textContent=tiltZ.toFixed(2);
    document.getElementById('hud-gyro').textContent=
      gyroEnabled?(gyroActive?'OK ✓':'WAIT'):'OFF';
    const td=document.getElementById('tilt-dot');
    td.setAttribute('cx',24+tiltZ*40);
    td.setAttribute('cy',24+tiltX*40);
    MAT_BALL.emissiveIntensity=0.15+Math.sin(frame*0.1)*0.08;
    MAT_FINISH.emissiveIntensity=0.25+Math.sin(frame*0.08)*0.15;
    MAT_START.emissiveIntensity=0.2+Math.sin(frame*0.06)*0.1;
  }
  renderer.render(scene,camera);
}
animate();
</script>
</body>
</html>
